<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="M.R. Accountants — ACCA chartered certified accountants in Woodford Green, Essex. Accounting, tax planning, business advisory and private client services that turn financial chaos into clarity."
    />
    <meta name="theme-color" content="#0b2018" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="M.R. Accountants — Chartered Certified Accountants, Essex" />
    <meta
      property="og:description"
      content="Accounting is the art of turning chaos into clarity. Accounting, tax, and advisory for ambitious businesses and private clients."
    />
    <meta property="og:locale" content="en_GB" />

    <title>M.R. Accountants — Chartered Certified Accountants in Essex</title>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Static form for Netlify's build-time form detection. The live React form
      (src/components/Contact.tsx) submits to this via AJAX. Field names must match.
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
